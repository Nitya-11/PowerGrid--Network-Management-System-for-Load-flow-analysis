version: '3.8'

services:

  # ─── PostgreSQL Database ──────────────────────
  db:
    image: postgres:15          # use official postgres image (no Dockerfile needed)
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persist DB data
    ports:
      - "5432:5432"

  # ─── Django Backend ───────────────────────────
  backend:
    build: ./backend            # build from backend/Dockerfile
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./backend:/app          # live reload: your local code syncs into container
    ports:
      - "8001:8001"
    environment:
      - DB_NAME=mydb
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      - DB_HOST=db              # 'db' is the service name above — Docker resolves it!
      - DB_PORT=5432
    depends_on:
      - db                      # start db first before backend

  # ─── React Frontend ───────────────────────────
  frontend:
    build: ./frontend           # build from frontend/Dockerfile
    volumes:
      - ./frontend:/app         # live reload for React too
      - /app/node_modules       # keep node_modules inside container
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8001
    depends_on:
      - backend

# ─── Named Volumes ────────────────────────────
volumes:
  postgres_data:                # this persists your database across restarts